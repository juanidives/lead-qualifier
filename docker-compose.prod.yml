services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: "http://5.75.170.67:8080"
      AUTHENTICATION_API_KEY: "minha-chave-secreta"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:evolution@postgres:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_api"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_TTL: "604800"
      WEBHOOK_GLOBAL_URL: "http://fastapi:8000/webhook/whatsapp"
      WEBHOOK_GLOBAL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      EVOLUTION_API_URL: "http://evolution-api:8080"
      POSTGRES_URL: "postgresql://evolution:evolution@postgres:5432/leadqualifier"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      evolution-api:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery-worker
    restart: unless-stopped
    working_dir: /app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      EVOLUTION_API_URL: "http://evolution-api:8080"
      POSTGRES_URL: "postgresql://evolution:evolution@postgres:5432/leadqualifier"
    depends_on:
      - redis
      - postgres
      - fastapi

volumes:
  postgres_data:
  evolution_instances:
  redis_data:
